spring.application.name=suiviprojet

# ============================
# Base de données
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/suivi_projet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================
# Serveur
# ============================
server.port=8082

# ============================
# JWT Configuration
# ============================
jwt.secret=Ma$Cle$Secrete$TresLongue$EtAleatoire$SuiviProjet$2026$256Bits$FgHjKl
jwt.expiration=86400000

# ============================
# File Upload Configuration
# ============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# ============================
# Swagger UI
# ============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
